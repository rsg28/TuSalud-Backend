# Nginx: api.tu-salud.xyz → Node (puerto 3000) con SSL (Let's Encrypt)
# Ubicación en el servidor: /etc/nginx/sites-available/api.tu-salud.xyz.conf
# Tras Certbot: symlink en sites-enabled y ssl_certificate* se rellenan automáticamente.

# Redirigir HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.tu-salud.xyz;
    # Certbot usa este server block para el challenge ACME
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS → proxy al backend en puerto 3000
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.tu-salud.xyz;

    # Certificados (Certbot los crea aquí)
    ssl_certificate     /etc/letsencrypt/live/api.tu-salud.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.tu-salud.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Headers para el backend
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }
}
